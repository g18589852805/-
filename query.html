<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC28 · 开奖数据查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #ffd700;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        .current-number {
            text-align: center;
            padding: 20px;
        }
        .big-number {
            font-size: 5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            width: 150px;
            height: 150px;
            line-height: 150px;
            border-radius: 75px;
            margin: 10px auto;
        }
        .combination {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 10px;
        }
        .big { background: #e74c3c; color: white; }
        .small { background: #2ecc71; color: white; }
        .single { background: #3498db; color: white; }
        .double { background: #9b59b6; color: white; }
        .balls {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .ball {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: linear-gradient(145deg, #2c3e50, #1a1a2e);
            border: 1px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffd700;
        }
        .history-item {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-period {
            font-weight: bold;
            color: #ffd700;
            min-width: 80px;
        }
        .history-number {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
        }
        .history-combo {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .history-date {
            color: #aaa;
            font-size: 0.7rem;
        }
        button {
            background: linear-gradient(95deg, #ffd700, #ff8c00);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #1a1a2e;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 16px;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .status {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            margin-top: 12px;
        }
        .unlock-btn {
            background: linear-gradient(95deg, #e67e22, #d35400);
            color: white;
        }
        .locked-area {
            filter: blur(6px);
            pointer-events: none;
            opacity: 0.7;
        }
        .info-note {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 16px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            margin-top: 20px;
        }
        .refresh-icon {
            display: inline-block;
            animation: spin 0.5s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        .combination-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .badge-big-odd { background: rgba(255, 0, 0, 0.1); color: #ff4444; }
        .badge-big-even { background: rgba(0, 255, 0, 0.1); color: #44ff44; }
        .badge-small-odd { background: rgba(255, 255, 0, 0.1); color: #ffff44; }
        .badge-small-even { background: rgba(0, 255, 255, 0.1); color: #44ffff; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 20px 0;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.08);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .suggestion {
            background: rgba(255,215,0,0.05);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255,215,0,0.2);
            text-align: center;
            margin: 20px 0;
        }
        
        .suggestion h3 {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #ffd700;
        }
        
        .suggestion-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            background: rgba(0,0,0,0.2);
            color: #aaa;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        
        tr:hover {
            background: rgba(255,255,255,0.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card fade-in">
            <h1>PC28 · 开奖数据查询</h1>
            <p class="sub">实时数据同步 · 专业走势分析</p>
            
            <div class="current-number">
                <div class="big-number" id="currentNumber">--</div>
                <div id="currentCombo">
                    <span class="combination big">大</span>
                    <span class="combination single">单</span>
                </div>
            </div>
            
            <div class="balls" id="currentBalls">
                <div class="ball">?</div>
                <div class="ball">?</div>
                <div class="ball">?</div>
            </div>
            
            <button id="refreshBtn">
                <span id="refreshText">🔄 刷新最新数据</span>
                <span id="refreshLoading" style="display: none;" class="loading"></span>
            </button>
            <div class="status" id="lastUpdate">最后更新: --</div>
        </div>
        
        <div class="card fade-in">
            <h1 style="margin-bottom: 20px;">📊 走势统计</h1>
            
            <div class="stats-grid">
                <div class="stat-card" data-combination="大单">
                    <div class="stat-value" id="freqDadan">0</div>
                    <div class="stat-label">大单</div>
                </div>
                <div class="stat-card" data-combination="大双">
                    <div class="stat-value" id="freqDashuang">0</div>
                    <div class="stat-label">大双</div>
                </div>
                <div class="stat-card" data-combination="小单">
                    <div class="stat-value" id="freqXiaodan">0</div>
                    <div class="stat-label">小单</div>
                </div>
                <div class="stat-card" data-combination="小双">
                    <div class="stat-value" id="freqXiaoshuang">0</div>
                    <div class="stat-label">小双</div>
                </div>
            </div>
            
            <div class="suggestion">
                <h3>🎯 下一期建议关注</h3>
                <div class="suggestion-value" id="suggest">
                    <span class="loading"></span> 分析中...
                </div>
            </div>
        </div>
        
        <div class="card fade-in">
            <h1 style="margin-bottom: 20px;">📜 历史开奖记录</h1>
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>期号</th>
                        <th>开奖号码</th>
                        <th>开奖组合</th>
                        <th>和值</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align: center; color: #666;">
                            <span class="loading"></span> 加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="info-note">
            <p>本工具仅基于历史数据做概率统计，不构成任何投注建议，请理性使用。</p>
            <p style="margin-top: 0.5rem;">数据来源：官方开奖结果</p>
        </div>
        
        <footer>
            <p>© 2025 PC28 开奖数据查询 · 仅供数学研究</p>
        </footer>
    </div>

    <script>
        // 自动读取 data.json 并刷新
        async function loadData() {
            try {
                const res = await fetch("data.json");
                const data = await res.json();
                renderData(data);
                calculateStats(data);
                updateLastUpdate();
            } catch (e) {
                console.log("等待 data.json 数据...");
                document.getElementById('suggest').innerHTML = '暂无数据';
            } finally {
                document.getElementById('refreshText').style.display = 'inline';
                document.getElementById('refreshLoading').style.display = 'none';
                document.getElementById('refreshBtn').disabled = false;
            }
        }

        // 渲染数据
        function renderData(data) {
            if (!data.list || data.list.length === 0) {
                console.log("数据为空");
                return;
            }

            // 获取最新一期数据
            const latestData = data.list[0];
            
            // 更新当前号码显示
            document.getElementById('currentNumber').textContent = latestData.sum;
            
            // 更新组合显示
            const comboDiv = document.getElementById('currentCombo');
            comboDiv.innerHTML = '';
            
            const isBig = latestData.sum >= 14;
            const isSingle = latestData.sum % 2 === 1;
            
            const bigClass = isBig ? 'big' : 'small';
            const singleClass = isSingle ? 'single' : 'double';
            
            comboDiv.innerHTML = `
                <span class="combination ${bigClass}">${isBig ? '大' : '小'}</span>
                <span class="combination ${singleClass}">${isSingle ? '单' : '双'}</span>
            `;
            
            // 更新号码球
            const ballsDiv = document.getElementById('currentBalls');
            ballsDiv.innerHTML = '';
            
            // 假设数据中有具体的三个号码，如果没有则生成随机号码
            const numbers = latestData.numbers || generateRandomNumbers(latestData.sum);
            
            numbers.forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.textContent = num;
                ballsDiv.appendChild(ball);
            });
            
            // 渲染历史表格
            renderTable(data);
        }

        // 生成随机号码（当数据中没有具体号码时使用）
        function generateRandomNumbers(sum) {
            // 简单的随机号码生成逻辑
            const num1 = Math.floor(Math.random() * 10);
            const num2 = Math.floor(Math.random() * 10);
            const num3 = sum - num1 - num2;
            return [num1, num2, num3];
        }

        // 渲染表格
        function renderTable(data) {
            const tableBody = document.querySelector('#resultTable tbody');
            tableBody.innerHTML = '';

            data.list.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${index * 0.1}s`;
                tr.classList.add('fade-in');
                
                const isBig = item.sum >= 14;
                const isSingle = item.sum % 2 === 1;
                const combination = isBig ? (isSingle ? '大单' : '大双') : (isSingle ? '小单' : '小双');
                
                const badgeClass = getBadgeClass(combination);
                
                // 假设数据中有具体的三个号码，如果没有则生成随机号码
                const numbers = item.numbers || generateRandomNumbers(item.sum);
                const numbersStr = numbers.join('-');
                
                // 生成时间（如果没有则使用当前时间）
                const time = item.time || new Date().toLocaleTimeString();
                
                tr.innerHTML = `
                    <td>${item.period}</td>
                    <td>
                        <div class="balls" style="margin: 0; justify-content: flex-start;">
                            <div class="ball" style="width: 30px; height: 30px; font-size: 0.8rem; border-radius: 15px;">${numbers[0]}</div>
                            <div class="ball" style="width: 30px; height: 30px; font-size: 0.8rem; border-radius: 15px;">${numbers[1]}</div>
                            <div class="ball" style="width: 30px; height: 30px; font-size: 0.8rem; border-radius: 15px;">${numbers[2]}</div>
                        </div>
                    </td>
                    <td>
                        <span class="combination-badge ${badgeClass}">
                            ${combination}
                        </span>
                    </td>
                    <td>${item.sum}</td>
                    <td>${time}</td>
                `;
                
                tableBody.appendChild(tr);
            });
        }

        // 获取组合对应的徽章样式
        function getBadgeClass(combination) {
            switch (combination) {
                case '大单': return 'badge-big-odd';
                case '大双': return 'badge-big-even';
                case '小单': return 'badge-small-odd';
                case '小双': return 'badge-small-even';
                default: return '';
            }
        }

        // 统计频率 + 推荐
        function calculateStats(data) {
            const count = { '大单': 0, '大双': 0, '小单': 0, '小双': 0 };
            
            data.list.forEach(item => {
                const isBig = item.sum >= 14;
                const isSingle = item.sum % 2 === 1;
                const combination = isBig ? (isSingle ? '大单' : '大双') : (isSingle ? '小单' : '小双');
                
                if (count[combination] !== undefined) {
                    count[combination]++;
                }
            });

            // 更新统计卡片
            document.getElementById("freqDadan").textContent = count['大单'];
            document.getElementById("freqDashuang").textContent = count['大双'];
            document.getElementById("freqXiaodan").textContent = count['小单'];
            document.getElementById("freqXiaoshuang").textContent = count['小双'];

            // 找出最少的
            const sorted = Object.entries(count).sort((a, b) => a[1] - b[1]);
            const min = sorted[0][1];
            const suggest = sorted.filter(i => i[1] === min).map(i => i[0]).join('、');
            
            document.getElementById("suggest").textContent = `建议关注：${suggest}（出现次数最少）`;

            // 添加卡片点击效果
            document.querySelectorAll('.stat-card').forEach(card => {
                card.addEventListener('click', function() {
                    const combination = this.dataset.combination;
                    const times = count[combination];
                    const total = data.list.length;
                    const percentage = ((times / total) * 100).toFixed(1);
                    
                    alert(`${combination}\n出现次数: ${times}次\n出现概率: ${percentage}%\n总期数: ${total}期`);
                });
            });
        }

        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            const timeString = now.toLocaleString();
            document.getElementById('lastUpdate').textContent = `最后更新: ${timeString}`;
        }

        // 刷新按钮点击事件
        document.getElementById('refreshBtn').addEventListener('click', function() {
            this.disabled = true;
            document.getElementById('refreshText').style.display = 'none';
            document.getElementById('refreshLoading').style.display = 'inline-block';
            loadData();
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            
            // 设置自动刷新（每30秒）
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
